<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Electrical Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ---------------- LOGIN ---------------- -->
<div id="loginScreen" class="login-container">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginError"></p>
</div>

<!-- ---------------- DASHBOARD ---------------- -->
<div id="dashboard" class="dashboard" style="display:none;">

<h1>⚡ Electrical Automation Dashboard</h1>

<!-- GRID -->
<div class="grid">

  <!-- TEMPERATURE -->
  <div class="card">
    <h3>Temperature</h3>
    <h2><span id="temp">0</span> °C</h2>
    <input type="range" id="tempSlider" min="0" max="50">
  </div>

  <!-- HUMIDITY -->
  <div class="card">
    <h3>Humidity</h3>
    <h2><span id="hum">0</span> %</h2>
    <input type="range" id="humSlider" min="0" max="100">
  </div>

  <!-- CURRENT -->
  <div class="card">
    <h3>Current</h3>
    <h2><span id="curr">0</span> A</h2>
    <input type="range" id="currentSlider" min="0" max="10" step="0.01">
  </div>

  <!-- AC CONTROL -->
  <div class="card">
    <h3>AC Control</h3>
    <p>Status: <span id="acStatus">OFF</span></p>
    <input type="range" id="acSlider" min="0" max="40">
    <br><br>
    <label>Threshold: <span id="acThresholdValue">31</span>°C</label>
    <input type="range" min="20" max="40" value="31"
      onchange="setACThreshold(this.value)">
    <button onclick="acOff()">Manual OFF</button>
  </div>

  <!-- LIGHT CONTROL -->
  <div class="card">
    <h3>Light</h3>
    <p>Status: <span id="lightStatus">OFF</span></p>
    <button onclick="lightOn()">ON</button>
    <button onclick="lightOff()">OFF</button>
  </div>

  <!-- MOTOR CONTROL -->
  <div class="card">
    <h3>Motor Control</h3>
    <select id="motorSelect">
      <option value="1">Mode 1</option>
      <option value="2">Mode 2</option>
      <option value="3">Mode 3</option>
      <option value="4">Mode 4</option>
    </select>
    <br><br>
    <button onclick="motorAction()">Action</button>
    <button onclick="motorOff()">OFF</button>
    <p>Status: <span id="motorStatus">OFF</span></p>
  </div>

  <!-- BREAKER -->
  <div class="card">
    <h3>Breaker</h3>
    <p>Status: <span id="breakerStatus">OFF</span></p>
    <p>Trip: <span id="tripStatus">FALSE</span></p>
    <button onclick="resetBreaker()">Reset</button>
  </div>

  <!-- SECURITY -->
  <div class="card">
    <h3>Security</h3>
    <p>Status: <span id="securityStatus">SAFE</span></p>
    <button onclick="resetSecurity()">Reset</button>
  </div>

</div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
